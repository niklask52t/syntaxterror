<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNTAXTERROR - IT Quiz Arena</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>

  <!-- ── MAIN MENU ─────────────────────────────────────────── -->
  <div id="screen-menu" class="screen active">
    <div class="logo-container">
      <h1 class="logo glitch" data-text="SYNTAXTERROR">SYNTAXTERROR</h1>
      <p class="subtitle">IT Quiz Arena &mdash; Kein Erbarmen</p>
    </div>
    <div class="menu-card">
      <div class="input-group">
        <label>Dein Name</label>
        <input type="text" id="player-name" maxlength="16" placeholder="z.B. xX_H4ck3r_Xx" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Avatar</label>
        <div id="avatar-picker" class="avatar-picker"></div>
      </div>
      <div class="btn-group">
        <button id="btn-create" class="btn btn-primary">
          <span class="btn-icon">+</span> Raum erstellen
        </button>
        <div class="divider"><span>oder</span></div>
        <div class="join-row">
          <input type="text" id="room-code" maxlength="5" placeholder="CODE" class="code-input" autocomplete="off">
          <button id="btn-join" class="btn btn-secondary">Beitreten</button>
        </div>
      </div>
    </div>
    <p class="footer-text">2-20 Spieler &bull; Quiz + Lernkarten &bull; Kein Erbarmen</p>
  </div>

  <!-- ── LOBBY ─────────────────────────────────────────────── -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-header">
      <h2>Lobby</h2>
      <div class="room-code-display">
        <span class="label">Room Code</span>
        <span id="lobby-code" class="code"></span>
        <button id="btn-copy-code" class="btn-icon-small" title="Code kopieren">📋</button>
      </div>
    </div>
    <div class="lobby-content">
      <div class="players-grid" id="players-grid"></div>
      <div id="host-settings" class="settings-panel" style="display:none">
        <h3>Spielmodus</h3>
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="quiz">
            <span class="mode-icon">🧠</span>
            <span class="mode-name">IT Quiz</span>
            <span class="mode-desc">Multiple Choice</span>
          </button>
          <button class="mode-btn" data-mode="flashcards">
            <span class="mode-icon">📚</span>
            <span class="mode-name">Lernkarten</span>
            <span class="mode-desc">Frage & Antwort</span>
          </button>
        </div>

        <!-- Quiz Settings -->
        <div id="settings-quiz" class="mode-settings">
          <label class="settings-label">Kategorien</label>
          <div class="category-selector" id="category-selector"></div>
          <div class="setting-row">
            <label>Fragen</label>
            <div class="setting-control">
              <button class="btn-sm" data-setting="questionCount" data-delta="-5">-</button>
              <span id="setting-questions">15</span>
              <button class="btn-sm" data-setting="questionCount" data-delta="5">+</button>
            </div>
          </div>
          <div class="setting-row">
            <label>Sekunden pro Frage</label>
            <div class="setting-control">
              <button class="btn-sm" data-setting="timePerQuestion" data-delta="-5">-</button>
              <span id="setting-time">15</span>
              <button class="btn-sm" data-setting="timePerQuestion" data-delta="5">+</button>
            </div>
          </div>
        </div>

        <!-- Flashcard Settings -->
        <div id="settings-flashcards" class="mode-settings" style="display:none">
          <label class="settings-label">Deck</label>
          <div class="category-selector" id="fc-deck-selector"></div>
          <div class="setting-row">
            <label>Karten</label>
            <div class="setting-control">
              <button class="btn-sm" data-setting="fcCount" data-delta="-5">-</button>
              <span id="setting-fc-count">20</span>
              <button class="btn-sm" data-setting="fcCount" data-delta="5">+</button>
            </div>
          </div>
          <div class="setting-row">
            <label>Sek. zum Nachdenken</label>
            <div class="setting-control">
              <button class="btn-sm" data-setting="fcTime" data-delta="-5">-</button>
              <span id="setting-fc-time">15</span>
              <button class="btn-sm" data-setting="fcTime" data-delta="5">+</button>
            </div>
          </div>
        </div>

        <button id="btn-start" class="btn btn-primary btn-large" style="margin-top:20px">🚀 Spiel starten</button>
      </div>
      <div id="guest-waiting" class="waiting-panel" style="display:none">
        <button id="btn-ready" class="btn btn-secondary btn-large">✓ Bereit</button>
        <p class="waiting-text">Warte auf den Host...</p>
        <p class="mode-display" id="guest-mode-display"></p>
      </div>
    </div>
  </div>

  <!-- ── COUNTDOWN ─────────────────────────────────────────── -->
  <div id="screen-countdown" class="screen">
    <div class="countdown-number" id="countdown-num">3</div>
  </div>

  <!-- ── QUIZ QUESTION ─────────────────────────────────────── -->
  <div id="screen-quiz" class="screen">
    <div class="question-header">
      <div class="question-progress"><span id="q-index">1</span>/<span id="q-total">15</span></div>
      <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
      <div class="timer-text" id="timer-text">15</div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="answers-grid" id="answers-grid"></div>
    <div class="waiting-answer" id="waiting-answer" style="display:none">
      <div class="pulse-dot"></div><span>Warte auf andere Spieler...</span>
    </div>
  </div>

  <!-- ── QUIZ RESULT ───────────────────────────────────────── -->
  <div id="screen-quiz-result" class="screen">
    <div class="result-container">
      <div class="result-correct-answer" id="result-correct"></div>
      <div class="result-roast" id="result-roast"></div>
      <div class="result-personal" id="result-personal"></div>
      <div class="mini-leaderboard" id="mini-leaderboard"></div>
    </div>
  </div>

  <!-- ── FLASHCARD QUESTION ────────────────────────────────── -->
  <div id="screen-fc-question" class="screen">
    <div class="question-header">
      <div class="question-progress"><span id="fc-q-index">1</span>/<span id="fc-q-total">20</span></div>
      <div class="timer-bar-container"><div class="timer-bar" id="fc-timer-bar"></div></div>
      <div class="timer-text" id="fc-timer-text">15</div>
    </div>
    <div class="fc-question-card">
      <div class="fc-label">FRAGE</div>
      <div class="fc-question-text" id="fc-q-text"></div>
    </div>
    <div class="fc-rate-buttons" id="fc-rate-buttons">
      <button id="fc-btn-knew" class="btn fc-btn-right">✓ Wusste ich</button>
      <button id="fc-btn-didnt" class="btn fc-btn-wrong">✗ Keine Ahnung</button>
    </div>
    <div class="waiting-answer" id="fc-waiting" style="display:none">
      <div class="pulse-dot"></div><span>Warte auf andere Spieler...</span>
    </div>
  </div>

  <!-- ── FLASHCARD REVEAL ──────────────────────────────────── -->
  <div id="screen-fc-reveal" class="screen">
    <div class="result-container">
      <div class="fc-reveal-answer" id="fc-reveal-answer"></div>
      <div class="fc-reveal-stats" id="fc-reveal-stats"></div>
      <div class="mini-leaderboard" id="fc-leaderboard"></div>
    </div>
  </div>

  <!-- ── GAME OVER ─────────────────────────────────────────── -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-container">
      <h2 class="gameover-title">GAME OVER</h2>
      <div class="podium" id="podium"></div>
      <div class="final-leaderboard" id="final-leaderboard"></div>
      <div id="stats-section" style="display:none">
        <button id="btn-toggle-stats" class="btn btn-secondary" style="margin-bottom:16px">📊 Statistik anzeigen</button>
        <div id="stats-container" class="stats-container" style="display:none"></div>
      </div>
      <button id="btn-play-again" class="btn btn-primary btn-large" style="display:none">🔄 Nochmal spielen</button>
      <button id="btn-back-menu" class="btn btn-secondary">Zurück zum Menü</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
